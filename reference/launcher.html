<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>slope64 Chatbot Launcher</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #0f1117 0%, #1a1d27 100%);
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: #1a1d27;
      border: 1px solid #2d3045;
      border-radius: 12px;
      padding: 40px;
      max-width: 500px;
      text-align: center;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
    }
    h1 {
      font-size: 2rem;
      color: #7eb3ff;
      margin-bottom: 12px;
    }
    .subtitle {
      font-size: 0.9rem;
      color: #888;
      margin-bottom: 8px;
    }
    .version {
      display: inline-block;
      background: #0f1117;
      border: 1px solid #2d3045;
      padding: 4px 12px;
      border-radius: 6px;
      font-size: 0.8rem;
      color: #666;
      margin-bottom: 30px;
    }
    .description {
      color: #aaa;
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 40px;
    }
    .launch-btn {
      background: linear-gradient(135deg, #3d6dbf 0%, #2d5a9f 100%);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 16px 48px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 12px rgba(61, 109, 191, 0.3);
      margin-bottom: 20px;
      width: 100%;
    }
    .launch-btn:hover {
      background: linear-gradient(135deg, #5285d4 0%, #3d6dbf 100%);
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(61, 109, 191, 0.4);
    }
    .launch-btn:active {
      transform: translateY(0);
    }
    .info {
      background: #0f1117;
      border: 1px solid #2d3045;
      border-radius: 8px;
      padding: 16px;
      font-size: 0.85rem;
      color: #888;
      margin-top: 20px;
      text-align: left;
    }
    .info p {
      margin: 8px 0;
    }
    .endpoint {
      font-family: 'Courier New', monospace;
      color: #7eb3ff;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>slope64 Q&A</h1>
    <div class="subtitle">Finite Element Analysis Assistant</div>
    <div class="version">v1.0.0</div>

    <p class="description">
      Ask questions about slope64 finite element analysis — input format, output interpretation, boundary conditions, slope stability concepts, and more.
    </p>

    <button class="launch-btn" onclick="launchChatbot()">
      Launch Chatbot →
    </button>

    <div class="info">
      <p><strong>Endpoint:</strong></p>
      <p class="endpoint" id="endpoint"></p>
      <p style="margin-top: 12px;"><strong>Status:</strong> <span id="status">Checking...</span></p>
    </div>
  </div>

  <script>
    const endpoint = window.location.origin.replace(/:\d+$/, ':8094');
    document.getElementById('endpoint').textContent = endpoint;

    function launchChatbot() {
      window.open(endpoint, 'slope64-chatbot', 'width=1000,height=800');
    }

    // Check health on load
    fetch(endpoint + '/health')
      .then(res => res.json())
      .then(data => {
        if (data.status === 'ok') {
          document.getElementById('status').textContent = '✓ Online';
          document.getElementById('status').style.color = '#6fcf97';
        }
      })
      .catch(() => {
        document.getElementById('status').textContent = '✗ Offline';
        document.getElementById('status').style.color = '#f85149';
      });

    // Allow Enter key to launch
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') launchChatbot();
    });
  </script>
</body>
</html>
